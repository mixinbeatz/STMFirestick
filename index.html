<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saint Thomas More – Glendale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;
      color: #f0f0f0;
      font-family: Georgia, serif;
      height: 100vh;
      overflow: hidden;
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url("splash.jpg") center center / cover no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 1s ease;
    }

    #splash .splash-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
    }

    #splash h1 {
      position: relative;
      font-size: 3.5rem;
      color: #c9a84c;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      z-index: 1;
    }

    #splash p {
      position: relative;
      font-size: 1.2rem;
      color: #f0f0f0;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      z-index: 1;
    }

    #splash .enter-btn {
      position: relative;
      margin-top: 2.5rem;
      padding: 1rem 3rem;
      background: transparent;
      border: 2px solid #c9a84c;
      color: #c9a84c;
      font-family: Georgia, serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 1;
      transition: all 0.2s;
    }

    #splash .enter-btn:hover,
    #splash .enter-btn:focus {
      background: #c9a84c;
      color: #000;
      outline: none;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* MAIN APP */
    #app {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: url("splash.jpg") center center / cover no-repeat;
    }

    #app.visible {
      display: flex;
    }

    #app .app-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
    }

    #app h1 {
      position: relative;
      font-size: 2.2rem;
      color: #c9a84c;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      z-index: 1;
      margin-bottom: 0.3rem;
    }

    #app .subtitle {
      position: relative;
      font-size: 0.95rem;
      color: #ddd;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 1;
      margin-bottom: 2rem;
    }

    .buttons {
      position: relative;
      display: flex;
      gap: 2rem;
      margin-bottom: 2.5rem;
      z-index: 1;
    }

    .btn {
      background: rgba(0,0,0,0.5);
      color: #f0f0f0;
      border: 2px solid #c9a84c;
      padding: 1.2rem 2.5rem;
      font-size: 1.2rem;
      font-family: Georgia, serif;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 220px;
      text-align: center;
    }

    .btn:hover, .btn:focus {
      background: #c9a84c;
      color: #000;
      outline: none;
      transform: scale(1.05);
    }

    .player-container {
      position: relative;
      width: 80vw;
      padding-top: 45vw;
      max-width: 1200px;
      max-height: 675px;
      display: none;
      z-index: 1;
    }

    .player-container.active {
      display: block;
    }

    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-overlay"></div>
    <h1>Saint Thomas More</h1>
    <p>Glendale, Arizona</p>
    <button class="enter-btn" onclick="enterApp()">Enter</button>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <div class="app-overlay"></div>
    <h1>Saint Thomas More</h1>
    <p class="subtitle">Glendale, Arizona</p>
    <div class="buttons">
      <button class="btn" onclick="loadPlayer('mass')">&#9917; Live Mass / Replay</button>
      <button class="btn" onclick="loadPlayer('sermon')">&#127897;&#65039; Sunday Sermon</button>
      <button class="btn" onclick="loadPlayer('special')">&#10024; Special Events</button>
    </div>
    <div class="player-container" id="player">
      <iframe id="videoFrame" src="" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>
    </div>
  </div>

  <script>
    const streams = {
      mass: "https://control.resi.io/webplayer/video.html?id=8c6cae64-d58a-4753-89be-54a7d8190d56",
      sermon: "https://control.resi.io/webplayer/video.html?id=541c26ac-3c58-40e6-9899-5cb9bc8ccac2",
      special: "https://control.resi.io/webplayer/video.html?id=26e22bda-9ea5-4505-a32c-f2fb92cf26e2"
    };

    function enterApp() {
      document.getElementById("splash").classList.add("hidden");
      setTimeout(() => {
        document.getElementById("app").classList.add("visible");
      }, 800);
    }

    function loadPlayer(type) {
      document.getElementById("videoFrame").src = streams[type];
      document.getElementById("player").classList.add("active");
    }
  </script>

</body>
</html>
